appName: "onix-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8081
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins

plugins:
  otelsetup:
    id: otelsetup
    config:
      serviceName: "beckn-onix"
      otlpEndpoint: "otel-collector-bap:4317"
      enableMetrics: "true"
      enableTracing: "true"
      enableLogs: "true"
      timeInterval: "5"
      auditFieldsConfig: "/app/config/audit-fields.yaml" # this can be git url
      producer: "sandbox.food-finder.com"
      producerType: "bap"

modules:
  - name: bapTxnReceiver
    path: /bap/receiver/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: 'bap-mock-il.iontest.in'
            keyId: '76EU8ZSdroiuxzokP9WZbxzc4CCG1m7LcnqU4pY5iWE5zfT6EHTPht'
            signingPrivateKey: 'Xk1geLi4kKYY0yAQGzgetJFGtp4Qzer7Kg9u4nLPzOE='
            signingPublicKey: 'CuHIE3TD5HOjQ6fioxv+IFYWx01LQPvJNJsTm8svUE8='
            encrPrivateKey: 'Xk1geLi4kKYY0yAQGzgetJFGtp4Qzer7Kg9u4nLPzOE='
            encrPublicKey: 'CuHIE3TD5HOjQ6fioxv+IFYWx01LQPvJNJsTm8svUE8='
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/local-simple-routing-BAPReceiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        - validateSign
        - addRoute
        - validateSchema
  
  - name: bapTxnCaller
    path: /bap/caller/
    handler:
      type: std
      role: bap
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            url: https://fabric.nfh.global/registry/dedi
            registryName: subscribers.beckn.one
            timeout: 10
            retry_max: 3
            retry_wait_min: 100ms
            retry_wait_max: 500ms
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: 'bap-mock-il.iontest.in'
            keyId: '76EU8ZSdroiuxzokP9WZbxzc4CCG1m7LcnqU4pY5iWE5zfT6EHTPht'
            signingPrivateKey: 'Xk1geLi4kKYY0yAQGzgetJFGtp4Qzer7Kg9u4nLPzOE='
            signingPublicKey: 'CuHIE3TD5HOjQ6fioxv+IFYWx01LQPvJNJsTm8svUE8='
            encrPrivateKey: 'Xk1geLi4kKYY0yAQGzgetJFGtp4Qzer7Kg9u4nLPzOE='
            encrPublicKey: 'CuHIE3TD5HOjQ6fioxv+IFYWx01LQPvJNJsTm8svUE8='
        schemaValidator:
          id: schemav2validator
          config:
            type: url
            location: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.beckn.io"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-simple-routing-BAPCaller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bap
      steps:
        - addRoute
        - sign
        - validateSchema
  
